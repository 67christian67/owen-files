<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | ZAC_V_FINAL</title>
    <style>
        :root { --bg: #050505; --red: #ff0000; --dark-red: #800000; --white: #eee; --font: 'Courier New', Courier, monospace; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--white); font-family: var(--font); overflow: hidden; }
        
        #lines { position: fixed; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 1000; }
        
        /* The Opening Screen */
        #audio-trigger { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--red); text-align: center; }

        /* The 3D Glowing Box */
        .terminal-box { 
            background: rgba(10, 10, 10, 0.98); 
            border: 2px solid var(--red); 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4), inset 0 0 20px rgba(255, 0, 0, 0.1); 
            max-width: 750px; width: 85%; 
            display: flex; flex-direction: column; align-items: center; 
            position: relative; animation: breathe 8s infinite ease-in-out; 
        }
        
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }

        #call-ui { display: none; text-align: center; }
        .incoming-text { letter-spacing: 5px; color: var(--red); animation: blink 1s infinite; }
        .call-btn { background: #0f0; color: black; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; border: none; font-family: var(--font); }
        
        .ghost-file { opacity: 0.01; font-size: 10px; margin-top: 30px; color: var(--red); pointer-events: none; transition: opacity 2s ease-in; }
        .ghost-active { opacity: 0.4 !important; cursor: pointer !important; pointer-events: auto !important; animation: glitch-flicker 3s infinite; }

        .missing-poster { border: 8px solid #ddd; background: #eee; color: black; padding: 20px; width: 220px; font-family: 'Arial Black', sans-serif; text-align: center; transform: rotate(-1deg); box-shadow: 0 0 30px rgba(255,0,0,0.3); margin: 0 auto; }
        .missing-poster h1 { margin: 0; font-size: 32px; background: black; color: white; padding: 5px; }

        .file-row { width: 100%; max-width: 400px; padding: 15px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .redact { color: #111; background: #111; cursor: pointer; padding: 0 4px; }
        .revealed { color: var(--red) !important; background: transparent !important; font-weight: bold; text-shadow: 0 0 8px var(--red); }
        .sys-btn { margin-top: 25px; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 10px 25px; cursor: pointer; display: none; text-transform: uppercase; }
        .timer { font-size: 3.5rem; color: var(--red); letter-spacing: 5px; margin: 10px 0; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes glitch-flicker { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.2; } }
        @keyframes breathe { 0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); transform: scale(1); } 50% { box-shadow: 0 0 70px rgba(255, 0, 0, 0.5); transform: scale(1.01); } }
    </style>
</head>
<body onload="checkInitialState()">

<div id="audio-trigger" onclick="initAudio()">
    <h2 style="letter-spacing:10px">SYSTEM BREACH</h2>
    <p style="font-size: 11px; opacity: 0.6;">[ CLICK TO INITIALIZE TERMINAL ]</p>
</div>

<div id="lines"></div>

<section id="scr-lock" class="screen">
    <div class="terminal-box">
        <div style="font-size: 40px; color: var(--red); cursor: pointer;" onclick="devBypass()">🔒</div>
        <div id="timer" class="timer">04:00:00</div>
        
        <div id="call-ui">
            <p class="incoming-text">INCOMING ENCRYPTED CALL</p>
            <button class="call-btn" onclick="startFakeCall()">ACCEPT</button>
        </div>

        <button id="unlock-btn" class="sys-btn" onclick="startBootSequence()">[ DECRYPT_ARCHIVE ]</button>
    </div>
</section>

<section id="scr-dir" class="screen">
    <div class="terminal-box">
        <h1 style="font-size: 10px; color: #444; margin-bottom: 20px;">/ROOT/HIDDEN_ARCHIVE</h1>
        <div id="dir-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="ghost-file" class="ghost-file" onclick="openFile(7)">HIDDEN_METADATA_08.X</div>
    </div>
</section>

<section id="scr-view" class="screen">
    <div class="terminal-box">
        <div id="text-output"></div>
        <div id="secret-content" style="display:none; margin-top: 10px;">
            <div class="missing-poster">
                <h1>MISSING</h1>
                <p style="font-weight:bold; margin: 5px 0; font-size: 18px;">ZAC [REDACTED]</p>
            </div>
        </div>
        <div style="display:flex; gap: 20px;">
            <button id="next-btn" class="sys-btn" onclick="backToDir()">[ RETURN ]</button>
            <button id="final-btn" class="sys-btn" onclick="finalLock()">[ PURGE_SYSTEM ]</button>
        </div>
    </div>
</section>

<script>
    let clickCount = 0;
    let revealedCount = 0;

    function initAudio() {
        document.getElementById('audio-trigger').style.display = 'none';
        showScreen('scr-lock'); // This fixes the black screen
        window.speechSynthesis.getVoices(); 
    }

    function startFakeCall() {
        document.getElementById('call-ui').style.display = 'none';
        const msg = new SpeechSynthesisUtterance("Every second I remain silent, the disappearance of Zac feels heavier. You should not have opened these files. He is watching you now.");
        msg.pitch = 0.5; msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
        msg.onend = () => { document.getElementById('unlock-btn').style.display = 'block'; };
    }

    const story = [
        "DOSSIER_001: The golden boy was a lie. Owen saw <span class='redact' onclick='revealName(this, 1)'>#####</span>.",
        "DOSSIER_002: Evidence points directly to <span class='redact' onclick='revealName(this, 2)'>#####</span>.",
        "DOSSIER_003: The storm cellar belonged to <span class='redact' onclick='revealName(this, 3)'>#####</span>.",
        "DOSSIER_004: Tactical gear linked to <span class='redact' onclick='revealName(this, 4)'>#####</span>.",
        "DOSSIER_005: Every image was captured by <span class='redact' onclick='revealName(this, 5)'>#####</span>.",
        "DOSSIER_006: Owen's final recording names <span class='redact' onclick='revealName(this, 6)'>#####</span>.",
        "DOSSIER_007: The figure standing behind you is <span class='redact' onclick='revealName(this, 7)'>#####</span>.",
        "DELETED_DATA: Subject status remains unknown."
    ];

    function devBypass() {
        clickCount++;
        if (clickCount === 3) {
            document.getElementById('timer').style.display = "none";
            document.getElementById('call-ui').style.display = "block";
        }
    }

    function checkInitialState() {
        if (!localStorage.getItem('lock_time')) {
            localStorage.setItem('lock_time', new Date().getTime() + (4 * 60 * 60 * 1000));
        }
        runClock();
    }

    function runClock() {
        const timerElement = document.getElementById('timer');
        const interval = setInterval(() => {
            const now = new Date().getTime();
            const diff = localStorage.getItem('lock_time') - now;
            if (diff <= 0) {
                clearInterval(interval);
                timerElement.style.display = "none";
                document.getElementById('call-ui').style.display = "block";
                return;
            }
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            timerElement.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function startBootSequence() { showScreen('scr-dir'); renderDir(); }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderDir() {
        const container = document.getElementById('dir-container');
        container.innerHTML = "";
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            row.className = `file-row`;
            row.innerHTML = `<span>RECORD_00${i+1}.LOG</span> <span>[READY]</span>`;
            row.onclick = () => openFile(i);
            container.appendChild(row);
        }
        if (revealedCount >= 7) { document.getElementById('ghost-file').classList.add('ghost-active'); }
    }

    function openFile(idx) {
        showScreen('scr-view');
        const out = document.getElementById('text-output');
        const secret = document.getElementById('secret-content');
        out.innerHTML = ""; secret.style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('final-btn').style.display = "none";

        if(idx === 7) {
            out.innerHTML = story[idx];
            secret.style.display = "block";
            document.getElementById('final-btn').style.display = "block";
        } else {
            let i = 0; let full = story[idx];
            const type = setInterval(() => {
                if (full.charAt(i) === '<') i = full.indexOf('>', i) + 1; else i++;
                out.innerHTML = full.substring(0, i);
                if (i >= full.length) { clearInterval(type); out.innerHTML = full; }
            }, 20);
        }
    }

    function revealName(el, num) {
        if (!el.classList.contains('revealed')) { el.innerText = "ZAC"; el.className = "revealed"; revealedCount++; }
        document.getElementById('next-btn').style.display = "block";
    }

    function backToDir() { showScreen('scr-dir'); renderDir(); }

    function finalLock() { localStorage.setItem('final_done', 'true'); location.reload(); }
</script>
</body>
</html>
