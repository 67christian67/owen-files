<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | ZAC_V_FINAL</title>
    <style>
        :root { 
            --bg: #050505; 
            --red: #ff0000; 
            --dark-red: #800000;
            --white: #eee; 
            --font: 'Courier New', Courier, monospace; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--white); 
            font-family: var(--font); overflow: hidden; 
        }
        
        #lines { 
            position: fixed; inset: 0; 
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); 
            pointer-events: none; z-index: 1000; 
        }

        /* FLICKER ANIMATION FOR CALL */
        .flicker { animation: scan-flicker 0.1s infinite; }
        @keyframes scan-flicker {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #audio-trigger {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--red); text-align: center;
        }

        .terminal-box {
            background: rgba(8, 8, 8, 0.95);
            border: 1px solid var(--red);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
            max-width: 750px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: breathe 8s infinite ease-in-out;
        }

        .owen-header {
            color: var(--red);
            font-size: clamp(2.5rem, 9vw, 4rem);
            letter-spacing: 15px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 1px 1px 0px var(--dark-red), 3px 3px 0px #400000, 0 0 20px rgba(255, 0, 0, 0.8);
            animation: header-glitch 5s infinite;
        }

        /* iMESSAGE CALL UI */
        #call-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            z-index: 6000; flex-direction: column; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .contact-photo {
            width: 130px; height: 130px; background: #1a1a1a;
            border-radius: 50%; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333; overflow: hidden;
        }
        
        .contact-photo::after {
            content: "👤"; font-size: 80px; filter: grayscale(1) brightness(0.3);
        }

        .caller-id { font-size: 34px; font-weight: 300; margin-bottom: 10px; color: white; }
        .call-status { color: #888; margin-bottom: 100px; font-size: 16px; letter-spacing: 0.5px; }
        .call-actions { display: flex; gap: 80px; }
        .call-btn-circle { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 30px; }
        .accept { background: #34c759; color: white; }
        .decline { background: #ff3b30; color: white; }
        
        #message-thread { 
            display: none; width: 85%; max-width: 450px; color: white; font-size: 18px; 
            line-height: 1.5; text-align: left; background: #1c1c1e; 
            padding: 22px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* GHOST FILE */
        .ghost-file { opacity: 0.02; font-size: 10px; margin-top: 30px; color: var(--red); pointer-events: none; transition: 3s; cursor: default; }
        .ghost-active { opacity: 0.5 !important; cursor: pointer !important; pointer-events: auto !important; }

        /* MISSING POSTER */
        .missing-poster { border: 6px solid #ddd; background: #eee; color: black; padding: 20px; width: 220px; font-family: 'Arial Black', sans-serif; text-align: center; transform: rotate(-1deg); margin: 20px auto; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .missing-poster h1 { background: black; color: white; margin: 0; font-size: 28px; padding: 5px; }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }

        #log-container { text-align: left; font-size: 13px; color: var(--red); width: 280px; height: 150px; overflow: hidden; margin: 20px 0; }
        .file-row { width: 100%; max-width: 400px; padding: 12px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #150000; }
        .unlocked { cursor: pointer; }
        .locked { opacity: 0.2; cursor: not-allowed; }

        #text-output { font-size: 1.1rem; line-height: 1.6; text-align: left; min-height: 250px; width: 100%; }
        .redact { color: #111; background: #111; cursor: pointer; }
        .revealed { color: var(--red) !important; background: transparent !important; font-weight: bold; text-shadow: 0 0 10px var(--red); }

        .sys-btn { margin-top: 25px; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 10px 25px; cursor: pointer; display: none; text-transform: uppercase; letter-spacing: 3px; }
        .timer { font-size: 3.5rem; color: var(--red); letter-spacing: 5px; font-weight: 200; margin: 10px 0; }

        @keyframes header-glitch { 0%, 90%, 100% { transform: skew(0deg); } 91% { transform: skew(15deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }
    </style>
</head>
<body onload="checkInitialState()">

<div id="audio-trigger" onclick="initAudio()">
    <h2 style="letter-spacing:10px">SYSTEM BREACH</h2>
    <p style="opacity: 0.5; font-size: 10px;">[ CLICK TO RESTORE DATA ACCESS ]</p>
</div>

<div id="call-screen">
    <div class="contact-photo" id="call-photo"></div>
    <div class="caller-id">Unknown Number</div>
    <div class="call-status" id="call-stat">calling...</div>
    <div id="message-thread"></div>
    <div class="call-actions" id="call-btns">
        <button class="call-btn-circle decline">✖</button>
        <button class="call-btn-circle accept" onclick="acceptCall()">✔</button>
    </div>
</div>

<div id="lines"></div>

<section id="scr-lock" class="screen">
    <div class="terminal-box">
        <h1 class="owen-header">OWEN FILES</h1>
        <div style="font-size: 40px; color: var(--red); cursor: pointer;" onclick="devBypass()">🔒</div>
        <div id="timer" class="timer">04:00:00</div>
        <button id="unlock-btn" class="sys-btn" onclick="startBootSequence()">[ DECRYPT_ARCHIVE ]</button>
    </div>
</section>

<section id="scr-boot" class="screen"><div class="terminal-box"><div id="log-container"></div></div></section>

<section id="scr-dir" class="screen">
    <div class="terminal-box">
        <h1 style="font-size: 10px; color: #444; margin-bottom: 20px;">/ROOT/HIDDEN_ARCHIVE</h1>
        <div id="dir-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="ghost-file" class="ghost-file" onclick="openFile(7)">[DELETED_RECORD_08]</div>
    </div>
</section>

<section id="scr-view" class="screen">
    <div class="terminal-box">
        <div id="text-output"></div>
        <div id="poster-area" style="display:none;">
            <div class="missing-poster">
                <h1>MISSING</h1>
                <p><b>ZAC [REDACTED]</b></p>
                <p style="font-size: 11px;">SUBJECT #009<br>REPORT ANY SIGHTINGS.</p>
            </div>
        </div>
        <div style="display:flex; gap: 20px;">
            <button id="next-btn" class="sys-btn" onclick="backToDir()">[ RETURN ]</button>
            <button id="final-btn" class="sys-btn" onclick="finalLock()">[ PURGE_ALL ]</button>
        </div>
    </div>
</section>

<script>
    let clickCount = 0, unlockedProgress = 0;

    function initAudio() {
        document.getElementById('audio-trigger').style.display = 'none';
        showScreen('scr-lock'); 
    }

    function acceptCall() {
        document.getElementById('lines').classList.remove('flicker');
        document.getElementById('call-btns').style.display = 'none';
        document.getElementById('call-photo').style.display = 'none';
        document.querySelector('.caller-id').style.fontSize = '22px';
        document.getElementById('call-stat').innerText = '00:01';
        document.getElementById('message-thread').style.display = 'block';
        
        const msg = "I’ve spent months trying to bury this, but every time I stay silent, the weight of Zac’s disappearance feels heavier. You don’t understand what you’ve unearthed. These archives weren't meant to be found... and now that you’ve seen him, he’s already looking for you.";
        let i = 0;
        const type = setInterval(() => {
            document.getElementById('message-thread').innerText = msg.substring(0, i);
            i++;
            if(i > msg.length) {
                clearInterval(type);
                setTimeout(() => {
                    document.getElementById('call-screen').style.display = 'none';
                    document.getElementById('unlock-btn').style.display = 'block';
                }, 3500);
            }
        }, 50);
    }

    const story = [
        "DOSSIER_001: Owen saw <span class='redact' onclick='revealName(this, 1)'>#####</span>.",
        "DOSSIER_002: Evidence points to <span class='redact' onclick='revealName(this, 2)'>#####</span>.",
        "DOSSIER_003: Cellar owned by <span class='redact' onclick='revealName(this, 3)'>#####</span>.",
        "DOSSIER_004: Gloves in the bag of <span class='redact' onclick='revealName(this, 4)'>#####</span>.",
        "DOSSIER_005: Photos signed by <span class='redact' onclick='revealName(this, 5)'>#####</span>.",
        "DOSSIER_006: Owen whispers the name <span class='redact' onclick='revealName(this, 6)'>#####</span>.",
        "DOSSIER_007: The figure watching you is <span class='redact' onclick='revealName(this, 7)'>#####</span>.",
        "SECRET_008: Metadata recovery complete. Subject: Zac. Status: UNKNOWN."
    ];

    function devBypass() {
        clickCount++;
        if (clickCount === 3) {
            triggerCall();
        }
    }

    function triggerCall() {
        document.getElementById('timer').style.display = "none";
        document.getElementById('lines').classList.add('flicker');
        document.getElementById('call-screen').style.display = 'flex';
    }

    function checkInitialState() {
        if (!localStorage.getItem('lock_time')) {
            localStorage.setItem('lock_time', new Date().getTime() + (4 * 60 * 60 * 1000));
        }
        runClock();
    }

    function runClock() {
        setInterval(() => {
            const diff = localStorage.getItem('lock_time') - new Date().getTime();
            if (diff <= 0) {
                if(document.getElementById('call-screen').style.display !== 'flex') triggerCall();
                return;
            }
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function startBootSequence() {
        showScreen('scr-boot');
        const log = document.getElementById('log-container');
        const lines = ["> AUTHENTICATING...", "> ACCESS_GRANTED", "> READY."];
        let i = 0;
        const logInt = setInterval(() => {
            log.innerHTML += lines[i] + "<br>"; i++;
            if(i >= lines.length) { clearInterval(logInt); setTimeout(() => { showScreen('scr-dir'); renderDir(); }, 800); }
        }, 300);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderDir() {
        const container = document.getElementById('dir-container');
        container.innerHTML = "";
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            const isUnlocked = i <= unlockedProgress;
            row.className = `file-row ${isUnlocked ? 'unlocked' : 'locked'}`;
            row.innerHTML = `<span>RECORD_00${i+1}.LOG</span> <span>${i < unlockedProgress ? '[READ]' : '[OPEN]'}</span>`;
            if(isUnlocked) row.onclick = () => openFile(i);
            container.appendChild(row);
        }
        if (unlockedProgress >= 7) { document.getElementById('ghost-file').classList.add('ghost-active'); }
    }

    function openFile(idx) {
        showScreen('scr-view');
        const out = document.getElementById('text-output');
        const poster = document.getElementById('poster-area');
        out.innerHTML = ""; poster.style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('final-btn').style.display = "none";
        let i = 0; let full = story[idx];
        const type = setInterval(() => {
            if (full.charAt(i) === '<') i = full.indexOf('>', i) + 1; else i++;
            out.innerHTML = full.substring(0, i);
            if (i >= full.length) { 
                clearInterval(type); 
                if(idx === 7) { poster.style.display = "block"; document.getElementById('final-btn').style.display = "block"; }
            }
        }, 20);
    }

    function revealName(el, num) {
        el.innerText = "ZAC"; el.className = "revealed";
        if (unlockedProgress === num - 1) unlockedProgress = num;
        document.getElementById('next-btn').style.display = "block";
    }

    function backToDir() { showScreen('scr-dir'); renderDir(); }
    function finalLock() { location.reload(); }
</script>
</body>
</html>
