<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OWEN FILES</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#777;
color:#111;
font-family:monospace;
overflow:hidden;
}

/* old tv effect */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
repeating-linear-gradient(
to bottom,
rgba(0,0,0,.05),
rgba(0,0,0,.05) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
animation:flicker .15s infinite;
}
@keyframes flicker{
0%{opacity:.9}
50%{opacity:1}
100%{opacity:.95}
}

/* timer screen */
#timerScreen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}
#timer{
font-size:48px;
margin:20px;
}
#password{
position:absolute;
top:10px;
right:10px;
}

/* calling screen */
#callScreen{
display:none;
position:absolute;
inset:0;
align-items:center;
justify-content:center;
flex-direction:column;
}
.phone{
font-size:80px;
animation:ring 1s infinite;
}
@keyframes ring{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
75%{transform:rotate(-5deg)}
100%{transform:rotate(0)}
}

/* directory */
#directory{
display:none;
padding:20px;
}
.file{
cursor:pointer;
padding:10px;
margin:10px 0;
border:1px solid #444;
animation:open .5s;
}
@keyframes open{
from{opacity:0}
to{opacity:1}
}

/* file viewer */
#viewer{
display:none;
padding:20px;
}
.redacted{
background:#111;
color:#111;
padding:2px 6px;
cursor:pointer;
}
.redacted.open{
background:none;
color:#111;
border-bottom:1px solid #111;
}

/* crash */
#crash{
display:none;
position:absolute;
inset:0;
background:#666;
color:#000;
font-size:24px;
align-items:center;
justify-content:center;
animation:glitch .1s infinite;
}
@keyframes glitch{
0%{transform:translate(0)}
25%{transform:translate(2px,0)}
50%{transform:translate(-2px,0)}
}

/* revealed name */
.reveal{
color:#b00000;
font-weight:bold;
text-shadow:0 0 8px red;
}

/* secret tab */
#secret{
position:absolute;
top:10px;
left:10px;
opacity:.3;
cursor:pointer;
}
</style>
</head>

<body>

<div id="timerScreen">
<div id="secret">secret</div>
<h1>OWEN FILES</h1>
<div id="timer">loading</div>
<input id="password" placeholder="password">
</div>

<div id="callScreen">
<div class="phone">📞</div>
<div>connecting...</div>
</div>

<div id="directory"></div>

<div id="viewer"></div>

<div id="crash">system error</div>

<audio id="ring" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_27e6c0c4a4.mp3">
</audio>

<script>
const unlock="hamburger"
const target=new Date()
target.setDate(target.getDate()+1)
target.setHours(17,0,0,0)

const files=[
{
title:"file 1",
text:`zac was everywhere
bars parties nights that never ended
then one day he stopped
no warning no goodbye just silence
last person seen with <span class="redacted">Owen</span>`
},
{
title:"file 2",
text:`people said zac needed space
but his phone kept ringing unanswered
messages sent but never opened
his last location pinged near <span class="redacted">Owen</span>s place`
},
{
title:"file 3",
text:`security footage missing
bar cameras conveniently offline
bartender remembers zac leaving with <span class="redacted">Owen</span>`
},
{
title:"file 4",
text:`police questioned everyone
stories didnt match
<span class="redacted">Owen</span> changed details every time`
},
{
title:"file 5",
text:`neighbors reported yelling
then silence
a car leaving at 2am
registered to <span class="redacted">Owen</span>`
},
{
title:"file 6",
text:`evidence went missing
blood cleaned too well
someone knew what they were doing
<span class="redacted">Owen</span> lawyered up`
},
{
title:"file 7",
text:`confession recorded but never filed
he said zac begged
said it was an accident
said his name
<span class="redacted">Owen</span>`
}
]

let unlocked=0

function tick(){
const now=new Date()
const diff=target-now
if(diff<=0){
startCall()
return
}
const h=Math.floor(diff/1000/60/60)
const m=Math.floor(diff/1000/60)%60
const s=Math.floor(diff/1000)%60
timer.innerText=`${h}:${m}:${s}`
}
setInterval(tick,1000)

password.onchange=()=>{
if(password.value===unlock) startCall()
}

function startCall(){
timerScreen.style.display="none"
callScreen.style.display="flex"
ring.play()
setTimeout(()=>{
ring.pause()
callScreen.style.display="none"
showDirectory()
},10000)
}

function showDirectory(){
directory.style.display="block"
renderFiles()
}

function renderFiles(){
directory.innerHTML=""
for(let i=0;i<=unlocked;i++){
const d=document.createElement("div")
d.className="file"
d.innerText=files[i].title
d.onclick=()=>openFile(i)
directory.appendChild(d)
}
}

function openFile(i){
viewer.style.display="block"
directory.style.display="none"
viewer.innerHTML=`<h2>${files[i].title}</h2><p>${files[i].text}</p><button onclick="next(${i})">next</button>`
document.querySelectorAll(".redacted").forEach(r=>{
r.onclick=()=>r.classList.add("open")
})
}

function next(i){
if(i===6){
crashNow()
return
}
unlocked++
viewer.style.display="none"
showDirectory()
}

function crashNow(){
viewer.style.display="none"
crash.style.display="flex"
setTimeout(()=>{
crash.style.display="none"
unlocked++
showDirectory()
},3000)
}

secret.onclick=()=>{
viewer.style.display="block"
directory.style.display="none"
viewer.innerHTML=`
<h2>last known footage</h2>
<p class="reveal">OWEN</p>
<p>name zac</p>
<p>last seen with OWEN</p>
`
}
</script>

</body>
</html>
