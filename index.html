<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | ZAC_V_FINAL</title>
    <style>
        :root { 
            --bg: #050505; 
            --red: #ff0000; 
            --dark-red: #800000;
            --white: #eee; 
            --font: 'Courier New', Courier, monospace; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--white); 
            font-family: var(--font); overflow: hidden; 
        }
        
        #lines { 
            position: fixed; inset: 0; 
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); 
            pointer-events: none; z-index: 1000; 
        }

        .jitter { animation: jitter-bg 0.1s infinite; }
        @keyframes jitter-bg {
            0% { transform: translate(0,0); }
            50% { transform: translate(2px, -1px); filter: hue-rotate(10deg); }
            100% { transform: translate(-1px, 1px); }
        }

        .terminal-box {
            background: rgba(8, 8, 8, 0.95);
            border: 2px solid var(--red);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
            max-width: 800px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* iMESSAGE UI FROM PHOTO 1 */
        #call-screen {
            display: none; position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 6000; flex-direction: column; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .contact-photo {
            width: 100px; height: 100px; background: #333; border-radius: 50%;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #444; overflow: hidden; position: relative;
        }
        .contact-photo::after { content: "👤"; font-size: 60px; filter: brightness(0.2); }

        .caller-id { font-size: 28px; color: white; margin-bottom: 5px; }
        .call-status { color: #888; font-size: 14px; margin-bottom: 60px; }
        
        #message-thread { 
            display: none; width: 80%; max-width: 500px; color: white; font-size: 16px; 
            background: rgba(40, 40, 42, 0.9); padding: 15px 25px; border-radius: 25px;
            line-height: 1.4; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        .accept-btn {
            width: 70px; height: 70px; background: #34c759; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 30px; cursor: pointer; border: none; margin-top: 40px;
        }

        /* DOSSIER STYLE FROM PHOTO 2 */
        #text-output { font-size: 1.2rem; line-height: 1.8; text-align: left; width: 100%; color: #fff; }
        .redact { color: #111; background: #111; cursor: pointer; padding: 0 5px; }
        .revealed { color: var(--red) !important; background: transparent !important; font-weight: bold; }

        .sys-btn { 
            margin-top: 30px; background: transparent; border: 2px solid var(--red); 
            color: var(--red); padding: 10px 30px; cursor: pointer; 
            text-transform: uppercase; font-weight: bold;
        }

        .ghost-file { opacity: 0.02; font-size: 10px; margin-top: 20px; color: var(--red); cursor: default; }
        .ghost-active { opacity: 0.5 !important; cursor: pointer !important; }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }
        .file-row { width: 100%; max-width: 500px; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; cursor: pointer; }
        .locked { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body onload="checkInitialState()">

<div id="audio-trigger" onclick="initAudio()">
    <h2 style="letter-spacing:10px">SYSTEM BREACH</h2>
    <p>[ CLICK TO RESTORE ]</p>
</div>

<div id="call-screen">
    <div class="contact-photo"></div>
    <div class="caller-id">Unknown Number</div>
    <div class="call-status" id="timer-display">calling...</div>
    <div id="message-thread"></div>
    <button class="accept-btn" id="accept-ui" onclick="acceptCall()">✔</button>
</div>

<div id="lines"></div>

<section id="scr-lock" class="screen">
    <div class="terminal-box">
        <h1 style="letter-spacing:10px; color:var(--red)">OWEN FILES</h1>
        <div style="font-size: 50px; cursor: pointer;" onclick="devBypass()">🔒</div>
        <div id="timer" style="font-size: 3rem; margin: 20px 0;">04:00:00</div>
        <button id="unlock-btn" class="sys-btn" style="display:none" onclick="startBootSequence()">[ DECRYPT ]</button>
    </div>
</section>

<section id="scr-dir" class="screen">
    <div class="terminal-box">
        <h2 style="font-size: 12px; color: #555;">/ROOT/ENCRYPTED_LOGS</h2>
        <div id="dir-container" style="width:100%;"></div>
        <div id="ghost-file" class="ghost-file" onclick="openFile(7)">[RECOVERED_BYTE_8]</div>
    </div>
</section>

<section id="scr-view" class="screen">
    <div class="terminal-box">
        <div id="text-output"></div>
        <button id="next-btn" class="sys-btn" style="display:none" onclick="showScreen('scr-dir')">[ RETURN ]</button>
    </div>
</section>

<script>
    let clickCount = 0, unlockedProgress = 0;

    const story = [
        "DOSSIER_001: It started as a routine observation. Owen noted that the subject was deviating from the standard route home every Tuesday night. Following the trail through the back-alleys of the industrial district, Owen saw <span class='redact' onclick='revealName(this, 1)'>#####</span> standing perfectly still in the rain, staring at a dead CCTV camera for three hours.",
        "DOSSIER_002: Searching the local database for missing persons yields a strange overlap. Seven months ago, a student went missing from the local university. The physical description matches perfectly, but the behavior Owen witnessed suggests something else. Owen saw <span class='redact' onclick='revealName(this, 2)'>#####</span> entering a building that has been condemned since the 90s.",
        "DOSSIER_003: The internal temperature of the cellar shouldn't be that low. Owen documented frost on the walls despite it being mid-July. In the center of the room sat a single wooden chair. Owen saw <span class='redact' onclick='revealName(this, 3)'>#####</span> sitting there, holding a conversation with an empty corner of the room in a language that sounded like static.",
        "DOSSIER_004: Evidence is mounting that this isn't a kidnapping, but a transformation. Owen found a discarded jacket near the reservoir. Inside the pocket was a driver's license with the name scratched out. Owen saw <span class='redact' onclick='revealName(this, 4)'>#####</span> drinking from the reservoir at 3:00 AM, his reflection in the water looking entirely human while the body did not.",
        "DOSSIER_005: The photographs are the most disturbing part. In every frame, the subject is slightly blurred, as if the camera can't quite lock onto his physical form. Owen saw <span class='redact' onclick='revealName(this, 5)'>#####</span> in the background of his own family photos, years before he was even born. The timeline is breaking.",
        "DOSSIER_006: Owen’s handwriting in the physical journal is becoming illegible. He keeps repeating one phrase over and over: 'He is the anchor.' In the final recording, Owen saw <span class='redact' onclick='revealName(this, 6)'>#####</span> standing right outside his bedroom window, not moving, just waiting for the encryption to fail.",
        "DOSSIER_007: This is the final entry. If you are reading this, Owen is no longer the curator of these files. The subject has full access now. Owen saw <span class='redact' onclick='revealName(this, 7)'>#####</span> and realized that looking at him is an invitation. He is in the room with you.",
        "SECRET_008: FINAL LOG RECOVERY: The truth about the subject known as ZAC is that he never left. He simply shifted. Every time you click, every time you read, you are strengthening the connection. Zac is home."
    ];

    function initAudio() {
        document.getElementById('audio-trigger').style.display = 'none';
        showScreen('scr-lock'); 
    }

    function devBypass() {
        clickCount++;
        if (clickCount === 3) {
            document.getElementById('lines').classList.add('jitter');
            document.getElementById('call-screen').style.display = 'flex';
        }
    }

    function acceptCall() {
        document.getElementById('accept-ui').style.display = 'none';
        document.getElementById('message-thread').style.display = 'block';
        document.getElementById('timer-display').innerText = '00:01';
        
        const msg = "I’ve spent months trying to bury this, but every time I stay silent, the weight of Zac’s disappearance feels heavier. You don’t understand what you’ve unearthed. These archives weren't meant to be found... and now that you’ve seen him, he’s already looking for you. Be careful what you unlock.";
        let i = 0;
        const type = setInterval(() => {
            document.getElementById('message-thread').innerText = msg.substring(0, i);
            i++;
            if(i > msg.length) {
                clearInterval(type);
                setTimeout(() => {
                    document.getElementById('call-screen').style.display = 'none';
                    document.getElementById('lines').classList.remove('jitter');
                    document.getElementById('unlock-btn').style.display = 'block';
                }, 4000);
            }
        }, 40);
    }

    function checkInitialState() {
        if (!localStorage.getItem('lock_time')) {
            localStorage.setItem('lock_time', new Date().getTime() + (4 * 60 * 60 * 1000));
        }
        runClock();
    }

    function runClock() {
        setInterval(() => {
            const diff = localStorage.getItem('lock_time') - new Date().getTime();
            if (diff <= 0) {
                document.getElementById('call-screen').style.display = 'flex';
                return;
            }
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function startBootSequence() {
        showScreen('scr-dir');
        renderDir();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderDir() {
        const container = document.getElementById('dir-container');
        container.innerHTML = "";
        for (let i = 0; i < 7; i++) {
            const row = document.createElement('div');
            const isUnlocked = i <= unlockedProgress;
            row.className = `file-row ${isUnlocked ? '' : 'locked'}`;
            row.innerHTML = `<span>RECORD_LOG_00${i+1}</span> <span>${isUnlocked ? '[OPEN]' : '[LOCKED]'}</span>`;
            if(isUnlocked) row.onclick = () => openFile(i);
            container.appendChild(row);
        }
        if (unlockedProgress >= 7) document.getElementById('ghost-file').classList.add('ghost-active');
    }

    function openFile(idx) {
        showScreen('scr-view');
        const out = document.getElementById('text-output');
        out.innerHTML = "";
        document.getElementById('next-btn').style.display = "none";
        
        let i = 0; let full = story[idx];
        const type = setInterval(() => {
            if (full.charAt(i) === '<') i = full.indexOf('>', i) + 1; else i++;
            out.innerHTML = full.substring(0, i);
            if (i >= full.length) { 
                clearInterval(type); 
                if(idx === 7) document.getElementById('next-btn').style.display = "block";
            }
        }, 15);
    }

    function revealName(el, num) {
        el.innerText = "ZAC"; el.className = "revealed";
        if (unlockedProgress === num - 1) unlockedProgress = num;
        document.getElementById('next-btn').style.display = "block";
    }
</script>
</body>
</html>
